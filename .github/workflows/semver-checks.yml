name: semver-checks

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Run only one semver-check per PR branch at a time.
concurrency:
  group: semver-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semver-checks:
    name: cargo-semver-checks (vs. published)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo-semver-checks binary
        id: cache-semver
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-semver-checks
          key: cargo-semver-checks-${{ runner.os }}-v1

      - name: Install cargo-semver-checks (if not cached)
        if: steps.cache-semver.outputs.cache-hit != 'true'
        run: cargo install cargo-semver-checks --locked

      - name: Run semver-checks against the latest published release
        # `check-release` walks the public API and compares it to the
        # version on crates.io. A breaking change without the
        # appropriate major/minor bump is a non-zero exit.
        #
        # While we are pre-1.0, breaking changes are allowed inside
        # 0.x bumps; this workflow runs as a heads-up so we never
        # accidentally break the API in a PATCH (e.g. 0.9.10 vs
        # 0.9.9 must be additive). After 1.0 cuts, this becomes a
        # hard gate against unintended breaks.
        run: cargo semver-checks check-release --all-features
