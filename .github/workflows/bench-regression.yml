name: bench-regression

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Cancel an in-flight bench run on a branch when a new commit lands;
# benches are expensive and we only ever want the latest verdict.
concurrency:
  group: bench-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bench:
    name: Run benches and check for regressions (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          # Fetch enough history that we can check out the PR's base
          # commit for a same-machine baseline run.
          fetch-depth: 50

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Install critcmp (criterion comparison tool)
        run: |
          if ! command -v critcmp >/dev/null 2>&1; then
            cargo install critcmp --locked
          fi

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: bench-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            bench-${{ runner.os }}-

      # Run the PR head's benches against a stable baseline name.
      - name: Run benchmarks (HEAD)
        run: |
          cargo bench --all-features --bench mmap_bench -- \
            --save-baseline pr-head

      # On PRs, also bench the merge-base commit on the same runner
      # so the comparison is apples-to-apples (same CPU, same kernel,
      # same noise floor). On pushes to main we skip this step
      # because there is no PR to compare against.
      - name: Bench PR base for same-machine comparison
        if: github.event_name == 'pull_request'
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          git fetch origin "$BASE" --depth 1 || true
          git checkout "$BASE" -- benches/ src/ Cargo.toml Cargo.lock
          cargo bench --all-features --bench mmap_bench -- \
            --save-baseline pr-base
          # Restore the PR head's tree so subsequent steps see it.
          git checkout HEAD -- benches/ src/ Cargo.toml Cargo.lock

      # Hard gate: any benchmark group regressing more than the
      # threshold fails the workflow. critcmp emits a "regressed"
      # line per group on its `--threshold` output. The threshold is
      # intentionally loose (15%) because shared CI runners are
      # noisy; a tighter gate produces false positives that waste
      # the maintainer's time. Real perf regressions are typically
      # 2x-100x and show up unmistakably.
      - name: Compare HEAD vs base (>15% regression fails the PR)
        if: github.event_name == 'pull_request'
        run: |
          set -e
          echo "Critcmp output:"
          critcmp pr-base pr-head | tee critcmp.txt
          # critcmp uses ANSI for the "1.15x or more slower" markers.
          # We grep for the canonical regression keyword instead so
          # the check is colour-independent.
          if grep -E "[0-9]+\.[0-9]+x slower" critcmp.txt | awk '{print $2}' | awk -F. '{if ($1 >= 1 && ($1 > 1 || $2 >= 15)) exit 1}'; then
            echo "::notice::No bench regressed beyond the 15% threshold."
          else
            echo "::error::At least one benchmark regressed more than 15%. See critcmp output above."
            exit 1
          fi

      - name: Upload criterion results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: criterion-${{ github.sha }}
          path: target/criterion/
          retention-days: 14
